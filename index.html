<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>نظام إدارة العيادة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --pri:#16728a;--pri2:#0d4a5c;--suc:#27ae60;--dan:#e74c3c;--war:#f39c12;
  --bg:#f0f4f8;--card:#fff;--bdr:#e0e8ee;--txt:#1a2332;--muted:#6b7a8d;
  --rad:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.5;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--pri),var(--pri2));}
.login-box{background:var(--card);border-radius:16px;padding:44px 38px;width:360px;box-shadow:0 12px 40px rgba(0,0,0,.2);}
.login-box .logo{text-align:center;font-size:2.4em;margin-bottom:6px;}
.login-box h2{text-align:center;color:var(--pri);font-size:1.3em;margin-bottom:28px;font-weight:700;}

/* LAYOUT */
.topbar{background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-name{font-weight:700;font-size:1.05em;}
.role-badge{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);padding:3px 14px;border-radius:20px;font-size:.78em;font-weight:600;}
.wrap{max-width:1100px;margin:0 auto;padding:24px 20px;}

/* TABS */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px;}
.tab{background:#e4edf0;color:var(--muted);border-radius:8px;padding:9px 18px;font-weight:700;font-size:.9em;cursor:pointer;border:none;transition:all .18s;}
.tab.on{background:var(--pri);color:#fff;box-shadow:0 2px 8px rgba(22,114,138,.3);}
.tab:hover:not(.on){background:#d0e2e8;color:var(--pri);}

/* CARDS */
.card{background:var(--card);border-radius:var(--rad);padding:22px 24px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid var(--bdr);}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.card-head h3{color:var(--pri);font-size:1.05em;font-weight:700;}

/* FORMS */
label{display:block;font-size:.83em;font-weight:700;color:var(--muted);margin:10px 0 4px;}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:7px;font-size:.93em;font-family:inherit;color:var(--txt);transition:border .18s;outline:none;background:#fff;}
input:focus,select:focus,textarea:focus{border-color:var(--pri);}
textarea{resize:vertical;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border:none;border-radius:7px;font-weight:700;cursor:pointer;font-size:.9em;font-family:inherit;transition:all .18s;white-space:nowrap;}
.btn-sm{padding:5px 12px;font-size:.82em;}
.btn-block{width:100%;justify-content:center;margin-top:8px;}
.btn-p{background:var(--pri);color:#fff;} .btn-p:hover{background:var(--pri2);}
.btn-s{background:var(--suc);color:#fff;} .btn-s:hover{background:#219a52;}
.btn-d{background:var(--dan);color:#fff;} .btn-d:hover{background:#c0392b;}
.btn-w{background:var(--war);color:#fff;} .btn-w:hover{background:#d68910;}
.btn-g{background:#95a5a6;color:#fff;} .btn-g:hover{background:#7f8c8d;}
.btn-out{background:transparent;border:1.5px solid var(--pri);color:var(--pri);} .btn-out:hover{background:var(--pri);color:#fff;}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
@media(max-width:700px){.g2,.g3,.g4{grid-template-columns:1fr;}.tabs{gap:4px;}.tab{padding:8px 12px;font-size:.82em;}}

/* TABLES */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.88em;}
thead tr{background:#f5f8fa;}
th{padding:10px 12px;text-align:right;font-weight:700;color:var(--muted);border-bottom:2px solid var(--bdr);white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
tbody tr:hover td{background:#f8fbfc;}
.total-row td{background:#eaf4fb;font-weight:700;}

/* STATUS BADGES */
.s-ok{color:#1e8449;background:#d5f5e3;padding:2px 10px;border-radius:12px;font-size:.8em;font-weight:700;}
.s-done{color:#1a5276;background:#d6eaf8;padding:2px 10px;border-radius:12px;font-size:.8em;font-weight:700;}
.s-can{color:#922b21;background:#fadbd8;padding:2px 10px;border-radius:12px;font-size:.8em;font-weight:700;}
.s-on{color:#1e8449;background:#d5f5e3;padding:2px 10px;border-radius:12px;font-size:.8em;font-weight:700;}
.s-off{color:#922b21;background:#fadbd8;padding:2px 10px;border-radius:12px;font-size:.8em;font-weight:700;}

/* KPI CARDS */
.kpi{background:var(--card);border-radius:var(--rad);padding:20px;text-align:center;border:1px solid var(--bdr);}
.kpi-val{font-size:1.7em;font-weight:800;margin:6px 0;}
.kpi-lbl{font-size:.8em;color:var(--muted);}
.kpi-g .kpi-val{color:var(--suc);}
.kpi-b .kpi-val{color:var(--pri);}
.kpi-w .kpi-val{color:var(--war);}
.kpi-r .kpi-val{color:var(--dan);}

/* PERM ROW */
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:10px 0;}
.perm-item{display:flex;align-items:center;gap:7px;font-size:.88em;}
.perm-item input[type=checkbox]{width:auto;accent-color:var(--pri);width:16px;height:16px;}

/* SEC CARD */
.sec-card{border:1px solid var(--bdr);border-radius:var(--rad);padding:18px;margin-bottom:14px;transition:box-shadow .18s;}
.sec-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);}
.sec-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sec-info strong{font-size:1em;}
.sec-info small{color:var(--muted);font-size:.82em;margin-right:6px;}

/* ALERTS */
.alert{padding:10px 14px;border-radius:7px;font-size:.88em;margin:8px 0;}
.alert-err{background:#fadbd8;color:#922b21;border:1px solid #f5b7b1;}
.alert-ok{background:#d5f5e3;color:#1e8449;border:1px solid #a9dfbf;}
.alert-info{background:#d6eaf8;color:#1a5276;border:1px solid #a9cce3;}

/* UTILS */
.hidden{display:none!important;}
.mt-8{margin-top:8px;}
.flex-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.empty{color:var(--muted);text-align:center;padding:24px;font-size:.9em;}
.divider{border:none;border-top:1.5px solid var(--bdr);margin:18px 0;}
.search-row{display:flex;gap:8px;margin-bottom:14px;}
.search-row input,.search-row select{margin:0;}
.badge-count{background:var(--pri);color:#fff;border-radius:10px;font-size:.75em;padding:1px 7px;margin-right:4px;}

/* PASSWORD TOGGLE */
.pw-row{display:flex;gap:0;margin-bottom:4px;}
.pw-row input{border-radius:7px 0 0 7px;border-right:none;}
.pw-row .pw-toggle{background:#f0f4f8;border:1.5px solid var(--bdr);border-right:1.5px solid var(--bdr);border-left:none;padding:0 10px;cursor:pointer;border-radius:0 7px 7px 0;color:var(--muted);}

/* LOADING SPINNER */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top:2px solid #fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a2332;color:#fff;padding:12px 24px;border-radius:8px;font-size:.9em;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<!-- Toast Notification -->
<div id="toast"></div>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <div class="logo">🏥</div>
    <h2>نظام إدارة العيادة</h2>
    <label>اسم المستخدم</label>
    <div class="pw-row">
      <input id="lu" placeholder="اسم المستخدم أو البريد الإلكتروني" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <label>كلمة المرور</label>
    <div class="pw-row">
      <input id="lp" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="pw-toggle" type="button" onclick="togglePw('lp',this)" title="إظهار/إخفاء">👁</button>
    </div>
    <button id="loginBtn" class="btn btn-p btn-block" onclick="doLogin()">تسجيل الدخول</button>
    <div id="loginErr" class="alert alert-err hidden" style="margin-top:10px"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="hidden">
  <div class="topbar">
    <div class="topbar-left">
      <span style="font-size:1.4em">🏥</span>
      <div>
        <span class="topbar-name" id="topName"></span>
        <span class="role-badge" id="topRole"></span>
      </div>
    </div>
    <button class="btn btn-g btn-sm" onclick="doLogout()">خروج ←</button>
  </div>
  <div class="wrap">
    <div class="tabs" id="tabsBar"></div>
    <div id="content"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
// ═══════════════════════════════════════════════════
// FIREBASE INIT
// ═══════════════════════════════════════════════════
const CFG = {
  apiKey:"AIzaSyCtL98uGH-3lzcq4SmV3LC0Axd2eFXCubg",
  authDomain:"system-eec0f.firebaseapp.com",
  projectId:"system-eec0f",
  storageBucket:"system-eec0f.firebasestorage.app",
  messagingSenderId:"830937495678",
  appId:"1:830937495678:web:608df956898f9d7f58c02f"
};
const app1 = firebase.initializeApp(CFG,'main');
const app2 = firebase.initializeApp(CFG,'sec');
const auth  = app1.auth();
const auth2 = app2.auth();
const db    = app1.firestore();

// منع الدخول التلقائي - الجلسة تنتهي عند إغلاق التاب
auth.setPersistence(firebase.auth.Auth.Persistence.SESSION).catch(()=>{});

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const DOM = '@clinic.sys';
let CU=null, ROLE=null, PERMS={}, DNAME='';
let _unsubscribers = []; // لإلغاء المستمعين عند تبديل التبويب

const DEFPERMS = {addAppt:false,cancelAppt:false,viewPay:false,viewHist:false};

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function toEmail(u){ return u.trim().toLowerCase().replace(/\s+/g,'_') + DOM; }

function esc(s){
  const d = document.createElement('div');
  d.innerText = s || '';
  return d.innerHTML;
}

function fmt(n){ return Number(n||0).toLocaleString('ar-EG'); }

function today(){ return new Date().toISOString().split('T')[0]; }

function togglePw(id, btn){
  const el = document.getElementById(id);
  if(el.type==='password'){ el.type='text'; btn.textContent='🔒'; }
  else { el.type='password'; btn.textContent='👁'; }
}

function toast(msg, type='ok'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show';
  el.style.background = type==='err' ? '#c0392b' : type==='warn' ? '#d68910' : '#1a2332';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.className=''; }, 3200);
}

function setLoading(btnId, loading){
  const b = document.getElementById(btnId);
  if(!b) return;
  if(loading){ b.disabled=true; b.dataset.orig=b.innerHTML; b.innerHTML='<span class="spinner"></span>'; }
  else { b.disabled=false; b.innerHTML=b.dataset.orig||b.innerHTML; }
}

function cleanupListeners(){
  _unsubscribers.forEach(u=>{ try{ u(); }catch(e){} });
  _unsubscribers = [];
}

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
async function doLogin(){
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value;
  const errEl = document.getElementById('loginErr');
  errEl.classList.add('hidden');
  if(!u||!p){ errEl.textContent='عبّي اسم المستخدم وكلمة المرور'; errEl.classList.remove('hidden'); return; }
  const email = u.includes('@') ? u : toEmail(u);
  setLoading('loginBtn', true);
  try{
    await auth.signInWithEmailAndPassword(email, p);
  } catch(e){
    errEl.textContent = 'اسم المستخدم أو كلمة المرور غلط';
    errEl.classList.remove('hidden');
    setLoading('loginBtn', false);
  }
}

function doLogout(){
  cleanupListeners();
  auth.signOut();
}

auth.onAuthStateChanged(async user => {
  if(!user){
    CU = null;
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('appScreen').classList.add('hidden');
    document.getElementById('loginErr').classList.add('hidden');
    document.getElementById('lu').value = '';
    document.getElementById('lp').value = '';
    document.getElementById('loginBtn').innerHTML = 'تسجيل الدخول';
    document.getElementById('loginBtn').disabled = false;
    return;
  }
  CU = user;

  // تحقق من نوع المستخدم
  try {
    const doctorDoc = await db.collection('doctors').doc(user.uid).get();
    if(doctorDoc.exists){
      ROLE = 'doctor';
      DNAME = doctorDoc.data().name || 'الطبيب';
      PERMS = {addAppt:true,cancelAppt:true,viewPay:true,viewHist:true};
    } else {
      const metaDoc = await db.collection('users_meta').doc(user.uid).get();
      if(metaDoc.exists){
        const d = metaDoc.data();
        if(d.deleted){ toast('هذا الحساب محذوف','err'); auth.signOut(); return; }
        if(d.active===false){ toast('هذا الحساب موقوف. تواصل مع الطبيب','err'); auth.signOut(); return; }
        ROLE = 'secretary';
        DNAME = d.displayName || d.username || 'سكرتيرة';
        PERMS = {...DEFPERMS,...(d.permissions||{})};
        // تطبيق كلمة مرور معلّقة إذا وُجدت
        if(d.pendingPassword){
          try {
            await user.updatePassword(d.pendingPassword);
            await db.collection('users_meta').doc(user.uid).update({
              pendingPassword: firebase.firestore.FieldValue.delete()
            });
          } catch(e){ console.warn('pending pw update failed', e.message); }
        }
      } else {
        toast('لم يتم إعداد الحساب بشكل صحيح. تواصل مع الطبيب','err');
        auth.signOut();
        return;
      }
    }
  } catch(e){
    toast('خطأ في تحميل بيانات المستخدم: '+e.message,'err');
    auth.signOut();
    return;
  }

  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
  document.getElementById('topName').textContent = DNAME;
  document.getElementById('topRole').textContent = ROLE==='doctor' ? '👨‍⚕️ الطبيب – تحكم كامل' : '🗂️ سكرتارية';
  buildTabs();
});

// ═══════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════
function buildTabs(){
  const tabs = [
    {id:'appts', label:'📅 المواعيد'},
    {id:'patients', label:'🧑‍⚕️ المرضى'},
  ];
  if(ROLE==='doctor'||PERMS.viewPay) tabs.push({id:'treasury', label:'💰 الخزينة'});
  if(ROLE==='doctor') tabs.push({id:'users', label:'👥 المستخدمون'});

  document.getElementById('tabsBar').innerHTML = tabs.map(t=>
    `<button class="tab" id="t_${t.id}" onclick="sw('${t.id}')">${t.label}</button>`
  ).join('');
  sw('appts');
}

function sw(id){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  const b = document.getElementById('t_'+id);
  if(b) b.classList.add('on');
  cleanupListeners();
  ({appts:renderAppts, patients:renderPatients, treasury:renderTreasury, users:renderUsers})[id]?.();
}

// ═══════════════════════════════════════════════════
// APPOINTMENTS
// ═══════════════════════════════════════════════════
let _appts = [];

function renderAppts(){
  const canAdd = ROLE==='doctor'||PERMS.addAppt;
  const canAct = ROLE==='doctor'||PERMS.cancelAppt;
  document.getElementById('content').innerHTML = `
  ${canAdd ? `
  <div class="card">
    <div class="card-head"><h3>📅 حجز موعد جديد</h3></div>
    <div class="g3">
      <div><label>اسم المريض *</label><input id="an" placeholder="اسم المريض الكامل"></div>
      <div><label>التاريخ *</label><input id="ad" type="date" value="${today()}"></div>
      <div><label>الوقت *</label><input id="at" type="time"></div>
    </div>
    <div><label>ملاحظة (اختياري)</label><textarea id="ao" rows="2" placeholder="سبب الزيارة أو ملاحظة..."></textarea></div>
    <button id="addApptBtn" class="btn btn-p mt-8" onclick="addAppt()">➕ حجز الموعد</button>
  </div>` : ''}
  <div class="card">
    <div class="card-head"><h3>قائمة المواعيد</h3></div>
    <div class="search-row">
      <input id="aSrch" placeholder="🔍 بحث باسم المريض..." oninput="drawAppts()" style="flex:1">
      <select id="aFilt" onchange="drawAppts()" style="width:150px">
        <option value="">كل الحالات</option>
        <option value="confirmed">✅ مؤكد</option>
        <option value="done">☑ تمّ</option>
        <option value="cancelled">❌ ملغى</option>
      </select>
    </div>
    <div id="apptTable"><div class="empty">جاري التحميل...</div></div>
  </div>`;

  const unsub = db.collection('appointments')
    .onSnapshot(snap=>{
      _appts = snap.docs.map(d=>({id:d.id,...d.data()}));
      _appts.sort((a,b)=>{
        const dc = (b.date||'').localeCompare(a.date||'');
        return dc !== 0 ? dc : (b.time||'').localeCompare(a.time||'');
      });
      drawAppts();
    }, err=> toast('خطأ في تحميل المواعيد: '+err.message,'err'));
  _unsubscribers.push(unsub);
}

function drawAppts(){
  const srch = (document.getElementById('aSrch')||{value:''}).value.toLowerCase();
  const filt = (document.getElementById('aFilt')||{value:''}).value;
  const canAct = ROLE==='doctor'||PERMS.cancelAppt;
  let list = _appts;
  if(srch) list = list.filter(a=>(a.patientName||'').toLowerCase().includes(srch));
  if(filt) list = list.filter(a=>a.status===filt);
  const el = document.getElementById('apptTable');
  if(!el) return;
  if(!list.length){ el.innerHTML='<div class="empty">لا توجد مواعيد مطابقة</div>'; return; }

  const statusBadge = s=>({
    confirmed: '<span class="s-ok">✅ مؤكد</span>',
    done:      '<span class="s-done">☑ تمّ</span>',
    cancelled: '<span class="s-can">❌ ملغى</span>'
  }[s]||s);

  el.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>المريض</th><th>التاريخ</th><th>الوقت</th><th>ملاحظة</th><th>بواسطة</th><th>الحالة</th>${canAct?'<th>إجراء</th>':''}</tr></thead>
    <tbody>
    ${list.map(a=>{
      // ─── التعديل: منع فتح البطاقة إذا كانت الحالة "done" ───
      const patientLink = (a.patientId && a.status !== 'done')
        ? `<button class="btn btn-out btn-sm" onclick="openPatientFile('${a.patientId}')">📋 ${esc(a.patientName)}</button>`
        : `<strong>${esc(a.patientName)}</strong>`;
      return `<tr>
      <td>${patientLink}</td>
      <td>${a.date||'-'}</td>
      <td>${a.time||'-'}</td>
      <td style="max-width:160px;color:var(--muted);font-size:.88em">${esc(a.note)||'-'}</td>
      <td style="font-size:.85em;color:var(--muted)">${esc(a.by)||'-'}</td>
      <td>${statusBadge(a.status)}</td>
      ${canAct?`<td><div class="flex-row" style="gap:4px">
        ${a.status==='confirmed'?`
          <button class="btn btn-s btn-sm" onclick="setApptStatus('${a.id}','done')">✓ تمّ</button>
          <button class="btn btn-d btn-sm" onclick="setApptStatus('${a.id}','cancelled')">إلغاء</button>
        `:a.status==='cancelled'?`<button class="btn btn-out btn-sm" onclick="setApptStatus('${a.id}','confirmed')">إعادة</button>`:'—'}
      </div></td>`:''}
    </tr>`;
    }).join('')}
    </tbody>
  </table></div>`;
}

// ─── البحث عن المريض أو إنشاؤه ───
async function findOrCreatePatientByName(name) {
  if (!name) throw new Error('اسم المريض مطلوب');
  const trimmed = name.trim();
  const snap = await db.collection('patients')
    .where('name', '==', trimmed)
    .where('deleted', '!=', true)
    .limit(1)
    .get();
  if (!snap.empty) {
    return snap.docs[0].id;
  }
  // إنشاء مريض جديد
  const ref = await db.collection('patients').add({
    name: trimmed,
    phone: '',
    dob: '',
    gender: '',
    history: '',
    deleted: false,
    by: DNAME,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  return ref.id;
}

async function addAppt(){
  const n = document.getElementById('an').value.trim();

  try{
    const patientId = await findOrCreatePatientByName(n);
    await db.collection('appointments').add({
      patientName: n,
      patientId: patientId,
      date: d,
      time: t,
      note: o,

      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

async function setApptStatus(id, status){
  const labels = {done:'تأكيد إتمام الموعد؟', cancelled:'إلغاء الموعد؟', confirmed:'إعادة تأكيد الموعد؟'};
  if(!confirm(labels[status]||'تأكيد؟')) return;
  try{
    await db.collection('appointments').doc(id).update({status});
    toast(status==='done'?'✅ تم تأكيد إتمام الموعد':status==='cancelled'?'تم إلغاء الموعد':'تم إعادة تأكيد الموعد');
  } catch(e){ toast('خطأ: '+e.message,'err'); }
}

async function exportPatExcel(pid, patName){
  if(typeof XLSX==='undefined'){ toast('مكتبة Excel لم تحمّل، تأكد من الاتصال بالإنترنت','err'); return; }
  toast('جاري تجهيز ملف Excel...');
  try{
    const wb = XLSX.utils.book_new();
    const [vSnap, pSnap] = await Promise.all([
      db.collection('visits').where('patientId','==',pid).get(),
      db.collection('payments').where('patientId','==',pid).get()
    ]);
    const visits = vSnap.docs.map(d=>d.data()).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const pays   = pSnap.docs.map(d=>d.data()).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const vRows = [['التاريخ','التشخيص','الأدوية','ملاحظات','بواسطة']];
    visits.forEach(v=> vRows.push([v.date||'',v.diagnosis||'',v.medications||'',v.notes||'',v.by||'']));
    const pRows = [['التاريخ','نوع الدفع','المدفوع','الإجمالي','المتبقي','البند','بواسطة']];
    let tp=0, tb=0;
    pays.forEach(p=>{
      const paid=Number(p.amountPaid)||0; const tot=Number(p.totalAmount)||paid;
      tp+=paid; tb+=tot;
      const tl={cash:'كاش',credit:'على الحساب',installment:'أقساط'}[p.payType]||p.payType;
      pRows.push([p.date||'',tl,paid,tot,tot-paid,p.note||'',p.by||'']);
    });
    pRows.push(['المجموع','',tp,tb,tb-tp,'','']);
    if(vRows.length>1) XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(vRows), 'الزيارات');
    if(pRows.length>1) XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(pRows), 'كشف الحساب');
    if(wb.SheetNames.length===0){ toast('لا توجد بيانات للتصدير','warn'); return; }
    XLSX.writeFile(wb, `ملف_${patName}_${today()}.xlsx`);
    toast('✅ تم تصدير ملف Excel');
  } catch(e){ toast('خطأ في التصدير: '+e.message,'err'); }
}

      _allPays.forEach(p=>{ tp+=Number(p.amountPaid)||0; tb+=Number(p.totalAmount)||Number(p.amountPaid)||0; pats.add(p.patientId); });
      const k1=document.getElementById('k1'); if(k1) k1.textContent=fmt(tp);
      const k2=document.getElementById('k2'); if(k2) k2.textContent=fmt(tb-tp);
      const k3=document.getElementById('k3'); if(k3) k3.textContent=pats.size;
      const k4=document.getElementById('k4'); if(k4) k4.textContent=fmt(tb);
      drawTreasury();
    }, err=>{
      // fallback without ordering
      db.collection('payments').onSnapshot(snap=>{
        _allPays = snap.docs.map(d=>({id:d.id,...d.data()}));
        _allPays.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
        let tp=0,tb=0; const pats=new Set();
        _allPays.forEach(p=>{tp+=Number(p.amountPaid)||0;tb+=Number(p.totalAmount)||Number(p.amountPaid)||0;pats.add(p.patientId);});
        const k1=document.getElementById('k1');if(k1)k1.textContent=fmt(tp);
        const k2=document.getElementById('k2');if(k2)k2.textContent=fmt(tb-tp);
        const k3=document.getElementById('k3');if(k3)k3.textContent=pats.size;
        const k4=document.getElementById('k4');if(k4)k4.textContent=fmt(tb);
        drawTreasury();
      });
    });
  _unsubscribers.push(unsub);
}

function drawTreasury(){
  const from = (document.getElementById('cFrom')||{value:''}).value;
  const to   = (document.getElementById('cTo')||{value:''}).value;
  let list = [..._allPays];
  if(from) list = list.filter(p=>(p.date||'')>=from);
  if(to)   list = list.filter(p=>(p.date||'')<=to);
  const el = document.getElementById('treasuryTable');
  if(!el) return;
  if(!list.length){ el.innerHTML='<div class="empty">لا توجد دفعات في هذه الفترة</div>'; return; }
  let tp=0, tb=0;
  const rows = list.map(p=>{
    const paid=Number(p.amountPaid)||0; const tot=Number(p.totalAmount)||paid; const rem=tot-paid;
    tp+=paid; tb+=tot;
    const tl={cash:'💵 كاش',credit:'📋 على الحساب',installment:'📆 أقساط'}[p.payType]||p.payType;
    return`<tr>
      <td style="white-space:nowrap">${p.date||'-'}</td>
      <td><strong>${esc(p.patientName)}</strong></td>
      <td>${tl}</td>
      <td style="color:var(--suc);font-weight:700">${fmt(paid)}</td>
      <td>${fmt(tot)}</td>
      <td style="color:${rem>0?'var(--war)':'var(--suc)'};font-weight:700">${fmt(rem)}</td>
      <td style="font-size:.85em">${esc(p.note)||'-'}</td>
      <td style="font-size:.82em;color:var(--muted)">${esc(p.by)||'-'}</td>
    </tr>`;
  }).join('');
  el.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>التاريخ</th><th>المريض</th><th>النوع</th><th>المدفوع</th><th>الإجمالي</th><th>المتبقي</th><th>البند</th><th>بواسطة</th></tr></thead>
    <tbody>
    ${rows}
    <tr class="total-row">
      <td colspan="3">المجموع (${list.length} دفعة)</td>
      <td style="color:var(--suc)">${fmt(tp)}</td>
      <td>${fmt(tb)}</td>
      <td style="color:${tb-tp>0?'var(--war)':'var(--suc)'}">${fmt(tb-tp)}</td>
      <td colspan="2"></td>
    </tr>
    </tbody>
  </table></div>`;
}

function exportTreasuryExcel(){
  if(typeof XLSX==='undefined'){ toast('مكتبة Excel لم تحمّل','err'); return; }
  const from=(document.getElementById('cFrom')||{value:''}).value;
  const to=(document.getElementById('cTo')||{value:''}).value;
  let list=[..._allPays];
  if(from) list=list.filter(p=>(p.date||'')>=from);
  if(to)   list=list.filter(p=>(p.date||'')<=to);
  if(!list.length){ toast('لا توجد بيانات للتصدير','warn'); return; }
  const rows=[['التاريخ','المريض','نوع الدفع','المدفوع','الإجمالي','المتبقي','البند','بواسطة']];
  let tp=0,tb=0;
  list.forEach(p=>{
    const paid=Number(p.amountPaid)||0; const tot=Number(p.totalAmount)||paid;
    tp+=paid; tb+=tot;
    const tl={cash:'كاش',credit:'على الحساب',installment:'أقساط'}[p.payType]||p.payType;
    rows.push([p.date||'',p.patientName||'',tl,paid,tot,tot-paid,p.note||'',p.by||'']);
  });
  rows.push(['المجموع','','',tp,tb,tb-tp,'','']);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:22},{wch:14},{wch:12},{wch:12},{wch:12},{wch:24},{wch:14}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'خزينة العيادة');
  XLSX.writeFile(wb,`خزينة_العيادة${from?'_'+from:''}${to?'_'+to:''}.xlsx`);
  toast('✅ تم تصدير ملف Excel');
}

// ═══════════════════════════════════════════════════
// USERS MANAGEMENT (Doctor only)
// ═══════════════════════════════════════════════════
function renderUsers(){
  document.getElementById('content').innerHTML = `
  <div class="card">
    <div class="card-head"><h3>➕ إضافة مستخدم جديد</h3></div>
    <div class="g3">
      <div>
        <label>اسم المستخدم (للدخول) *</label>
        <input id="nu" placeholder="مثال: sara (بدون مسافات)">
        <small style="color:var(--muted);font-size:.78em">يُستخدم لتسجيل الدخول فقط، لا يظهر للآخرين</small>
      </div>
      <div><label>الاسم الظاهر *</label><input id="nd" placeholder="مثال: سارة أحمد"></div>
      <div>
        <label>كلمة المرور * (6 أحرف على الأقل)</label>
        <div class="pw-row">
          <input id="np" type="password" placeholder="••••••••">
          <button class="pw-toggle" type="button" onclick="togglePw('np',this)">👁</button>
        </div>
      </div>
    </div>
    <div class="alert alert-info">اسم المستخدم يُحوَّل تلقائياً لبريد إلكتروني داخلي (اسم@clinic.sys) لا يحتاج بريداً حقيقياً.</div>
    <button id="createSecBtn" class="btn btn-s" onclick="createSec()">✅ إنشاء الحساب</button>
    <div id="createMsg" style="margin-top:8px"></div>
  </div>
  <div id="secList"><div class="empty">جاري التحميل...</div></div>`;

  const unsub = db.collection('users_meta').where('role','==','secretary')
    .onSnapshot(snap=>{
      const list = snap.docs.map(d=>({id:d.id,...d.data()})).filter(u=>!u.deleted);
      const el = document.getElementById('secList');
      if(!el) return;
      if(!list.length){ el.innerHTML='<div class="card"><div class="empty">لا يوجد مستخدمون مسجلون بعد</div></div>'; return; }
      el.innerHTML = list.map(u=>{
        const active = u.active!==false;

        // استخراج الاسم - دعم النسخ القديمة والجديدة
        const emailBase = (u.email||'').replace(DOM,'').replace('@clinic.sys','');
        const displayName = u.displayName || u.username || emailBase || '—';
        const username    = u.username    || emailBase || '—';

        // دعم مفاتيح الصلاحيات القديمة (addAppointments) والجديدة (addAppt)
        const op = u.permissions || {};
        const p = {
          addAppt:    op.addAppt    ?? op.addAppointments    ?? DEFPERMS.addAppt,
          cancelAppt: op.cancelAppt ?? op.cancelAppointments ?? DEFPERMS.cancelAppt,
          viewPay:    op.viewPay    ?? op.viewDailyPayments  ?? DEFPERMS.viewPay,
          viewHist:   op.viewHist   ?? op.viewMedicalHistory ?? DEFPERMS.viewHist,
        };

        return `<div class="card sec-card">
          <div class="sec-card-head">
            <div class="sec-info">
              <strong>${esc(displayName)}</strong>
              <small>(@${esc(username)})</small>
              <span class="${active?'s-on':'s-off'}">${active?'مفعّل':'موقوف'}</span>
            </div>
            <div class="flex-row">
              <button class="btn ${active?'btn-d':'btn-s'} btn-sm" onclick="togActive('${u.id}',${active})">${active?'⛔ إيقاف':'✅ تفعيل'}</button>
              <button class="btn btn-g btn-sm" onclick="deleteSec('${u.id}','${esc(displayName)}')">🗑 حذف</button>
            </div>
          </div>
          <!-- تحديث الاسم للمستخدمين القدامى -->
          ${(!u.displayName&&!u.username)?`
          <div class="alert alert-warn" style="background:#fef9e7;border:1px solid #f9e79f;color:#7d6608;padding:8px 12px;border-radius:6px;margin-bottom:10px;font-size:.85em">
            ⚠️ هذا الحساب أُنشئ بنسخة قديمة، يمكنك تحديث اسمه:
            <div class="flex-row" style="margin-top:6px">
              <input id="upd_n_${u.id}" placeholder="الاسم الظاهر الجديد" style="flex:1;margin:0">
              <input id="upd_u_${u.id}" placeholder="اسم المستخدم الجديد" style="flex:1;margin:0">
              <button class="btn btn-p btn-sm" onclick="updateUserName('${u.id}')">💾 تحديث</button>
            </div>
          </div>`:''} 
          <hr class="divider" style="margin:10px 0">
          <div class="perm-grid">
            <label class="perm-item"><input type="checkbox" id="pa_${u.id}" ${p.addAppt?'checked':''}><span>إضافة مواعيد</span></label>
            <label class="perm-item"><input type="checkbox" id="pc_${u.id}" ${p.cancelAppt?'checked':''}><span>إلغاء/إتمام مواعيد</span></label>
            <label class="perm-item"><input type="checkbox" id="pp_${u.id}" ${p.viewPay?'checked':''}><span>رؤية المدفوعات والخزينة</span></label>
            <label class="perm-item"><input type="checkbox" id="ph_${u.id}" ${p.viewHist?'checked':''}><span>التاريخ المرضي والوصفات</span></label>
          </div>
          <div class="flex-row mt-8">
            <button class="btn btn-p btn-sm" onclick="savePerms('${u.id}')">💾 حفظ الصلاحيات</button>
            <div class="pw-row" style="flex:1;max-width:280px">
              <input id="rp_${u.id}" type="password" placeholder="كلمة مرور جديدة...">
              <button class="pw-toggle" type="button" onclick="togglePw('rp_${u.id}',this)">👁</button>
            </div>
            <button class="btn btn-w btn-sm" onclick="resetPass('${u.id}')">🔑 تغيير الباسوورد</button>
          </div>
        </div>`;
      }).join('');
    }, err=> toast('خطأ في تحميل المستخدمين: '+err.message,'err'));
  _unsubscribers.push(unsub);
}

async function updateUserName(uid){
  const nd = document.getElementById(`upd_n_${uid}`).value.trim();
  const nu = document.getElementById(`upd_u_${uid}`).value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'_');
  if(!nd||!nu){ toast('عبّي الاسم الظاهر واسم المستخدم','err'); return; }
  try{
    await db.collection('users_meta').doc(uid).update({ displayName:nd, username:nu });
    toast('✅ تم تحديث الاسم');
  } catch(e){ toast('خطأ: '+e.message,'err'); }
}

async function createSec(){
  const u = document.getElementById('nu').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'_');
  const d = document.getElementById('nd').value.trim();
  const p = document.getElementById('np').value;
  const msgEl = document.getElementById('createMsg');
  msgEl.innerHTML = '';

  if(!u||!d||!p){
    msgEl.innerHTML = '<div class="alert alert-err">عبّي جميع الحقول المطلوبة</div>';
    return;
  }
  if(p.length<6){
    msgEl.innerHTML = '<div class="alert alert-err">كلمة المرور لازم تكون 6 أحرف على الأقل</div>';
    return;
  }

  setLoading('createSecBtn', true);
  try{
    // إنشاء الحساب بالتطبيق الثانوي (بدون تسجيل خروج الطبيب)
    const cred = await auth2.createUserWithEmailAndPassword(toEmail(u), p);
    const uid = cred.user.uid;
    await auth2.signOut();

    // حفظ البيانات بـ Firestore (بدون قيود الـ UID)
    await db.collection('users_meta').doc(uid).set({
      username: u,
      displayName: d,
      role: 'secretary',
      active: true,
      deleted: false,
      permissions: {...DEFPERMS},
      createdBy: DNAME,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    msgEl.innerHTML = `<div class="alert alert-ok">✅ تم إنشاء حساب "<strong>${esc(d)}</strong>" بنجاح!<br>اسم الدخول: <code>${u}</code></div>`;
    document.getElementById('nu').value='';
    document.getElementById('nd').value='';
    document.getElementById('np').value='';
    toast('✅ تم إنشاء الحساب بنجاح');
  } catch(e){
    if(e.code==='auth/email-already-in-use')
      msgEl.innerHTML = '<div class="alert alert-err">اسم المستخدم هذا مستخدم بالفعل</div>';
    else if(e.code==='auth/weak-password')
      msgEl.innerHTML = '<div class="alert alert-err">كلمة المرور ضعيفة جداً</div>';
    else
      msgEl.innerHTML = `<div class="alert alert-err">خطأ: ${esc(e.message)}</div>`;
  }
  setLoading('createSecBtn', false);
}

async function savePerms(uid){
  const perm = {
    addAppt:  document.getElementById(`pa_${uid}`).checked,
    cancelAppt: document.getElementById(`pc_${uid}`).checked,
    viewPay:  document.getElementById(`pp_${uid}`).checked,
    viewHist: document.getElementById(`ph_${uid}`).checked
  };
  try{
    await db.collection('users_meta').doc(uid).update({permissions: perm});
    toast('✅ تم حفظ الصلاحيات');
  } catch(e){ toast('خطأ في الحفظ: '+e.message,'err'); }
}

async function togActive(uid, cur){
  const action = cur ? 'إيقاف' : 'تفعيل';
  if(!confirm(`متأكد من ${action} هذا الحساب؟`)) return;
  try{
    await db.collection('users_meta').doc(uid).update({active: !cur});
    toast(`✅ تم ${action} الحساب`);
  } catch(e){ toast('خطأ: '+e.message,'err'); }
}

async function deleteSec(uid, name){
  if(!confirm(`⚠️ حذف حساب "${name}" نهائياً؟ هذا الإجراء لا يمكن التراجع عنه.`)) return;
  try{
    await db.collection('users_meta').doc(uid).update({
      deleted: true,
      active: false,
      deletedAt: firebase.firestore.FieldValue.serverTimestamp(),
      deletedBy: DNAME
    });
    toast('✅ تم حذف الحساب');
  } catch(e){ toast('خطأ في الحذف: '+e.message,'err'); }
}

async function resetPass(uid){
  const np = document.getElementById(`rp_${uid}`).value;
  if(!np||np.length<6){ toast('أدخل كلمة مرور جديدة (6 أحرف على الأقل)','err'); return; }
  try{
    await db.collection('users_meta').doc(uid).update({pendingPassword: np});
    document.getElementById(`rp_${uid}`).value='';
    toast('✅ تم حفظ كلمة المرور الجديدة. ستُطبَّق في المرة القادمة التي يسجل فيها المستخدم دخوله.');
  } catch(e){ toast('خطأ: '+e.message,'err'); }
}
